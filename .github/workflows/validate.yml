name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate skills
        run: bash scripts/validate-skills.sh

      - name: Validate behavior transcripts
        run: bash scripts/validate-behavior-tests.sh
